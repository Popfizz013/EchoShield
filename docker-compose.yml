services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file: 
      - ./.env  
    networks:
      - echoshield-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  middleware:
    build: 
      context: ./middleware
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PYTHON_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - echoshield-network

  frontend:
    build: 
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - middleware
    networks:
      - echoshield-network

networks:
  echoshield-network:
    driver: bridge